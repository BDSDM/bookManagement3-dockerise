server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------
    # Angular SPA static files
    # -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------
    # REST API proxy
    # -------------------------------
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional timeouts
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # -------------------------------
    # WebSocket / STOMP proxy
    # -------------------------------
    location /ws/ {
        # No trailing slash in proxy_pass to preserve path
        proxy_pass http://backend:8080/ws;

        proxy_http_version 1.1;

        # Required for WebSocket handshake
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        # Preserve client info headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent buffering for real-time messages
        proxy_buffering off;

        # Long-lived WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # -------------------------------
    # Optional: serve assets (images, CSS, JS) with caching
    # -------------------------------
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot)$ {
        expires 30d;
        access_log off;
    }
}